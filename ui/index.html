<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoRun Execution Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    window.tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              shell: "#E2E8E4",
              ink: "#1A1A1A",
              mint: "#B2F2BB",
              lavender: "#BDB2FF"
            },
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"]
            },
            boxShadow: {
              float: "0 24px 60px rgba(26, 26, 26, 0.08)"
            },
            keyframes: {
              "fade-up": {
                "0%": {
                  opacity: "0",
                  transform: "translateY(24px)"
                },
                "100%": {
                  opacity: "1",
                  transform: "translateY(0)"
                }
              },
              "bar-grow": {
                "0%": {
                  opacity: "0",
                  transform: "scaleY(0.35)"
                },
                "100%": {
                  opacity: "1",
                  transform: "scaleY(1)"
                }
              },
              float: {
                "0%, 100%": {
                  transform: "translate3d(0, 0, 0)"
                },
                "50%": {
                  transform: "translate3d(0, -18px, 0)"
                }
              }
            },
            animation: {
              "fade-up": "fade-up 700ms ease-out both",
              "bar-grow": "bar-grow 900ms cubic-bezier(0.22, 1, 0.36, 1) both",
              "float-slow": "float 10s ease-in-out infinite"
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-shell font-display text-ink">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="./app.js"></script>
</body>
</html>
